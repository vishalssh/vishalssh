<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .background { fill: #0d1117; }
      .player { fill: #58a6ff; }
      .enemy { stroke: #ffffff; stroke-width: 1; }
      .bullet { fill: #f85149; }
      .stats { fill: #58a6ff; font-family: monospace; font-size: 14px; }
      .title { fill: #c9d1d9; font-family: monospace; font-size: 16px; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="background" width="800" height="400"/>
  
  <!-- Stars background -->
  <circle cx="102" cy="301" r="1" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="377" cy="42" r="1" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="580" cy="351" r="1" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="45" cy="224" r="1" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="756" cy="78" r="1" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="234" cy="167" r="1" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="688" cy="312" r="1" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="421" cy="89" r="1" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="178" cy="245" r="1" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="567" cy="156" r="1" fill="#c9d1d9" opacity="0.5"/>

  <!-- Title -->
  <text class="title" x="10" y="25">GitHub Contributions Space Shooter</text>
  <text class="stats" x="10" y="45">Total Contributions: Loading...</text>

  <!-- Placeholder text for initial animation -->
  <text x="400" y="200" fill="#c9d1d9" font-size="20" text-anchor="middle" font-family="monospace">
    Animation will be generated by GitHub Actions
  </text>
  
  <!-- Player Ship -->
  <g>
    <polygon class="player" points="400,350 385,370 415,370">
      <animate attributeName="points" 
               values="400,350 385,370 415,370;
                       500,350 485,370 515,370;
                       400,350 385,370 415,370"
               dur="5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Sample Bullets -->
  <circle class="bullet" cx="340" cy="350" r="3">
    <animate attributeName="cy" from="350" to="0" dur="1s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="cx" from="340" to="440" dur="5s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle class="bullet" cx="370" cy="350" r="3">
    <animate attributeName="cy" from="350" to="0" dur="1s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="cx" from="370" to="470" dur="5s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
</svg>
